name: Validate & Build Manifest

on:
  push:
    branches: [main]
    paths:
      - 'catalog/**'
      - 'addons/**'
      - 'scripts/build_manifest.py'
      - '.github/workflows/validate-and-build.yml'
  pull_request:
    paths:
      - 'catalog/**'
      - 'addons/**'
      - 'scripts/build_manifest.py'

permissions:
  contents: write

jobs:
  validate:
    name: Validate JSON bundles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure every bundle parses as JSON
        run: |
          set -euo pipefail
          fail=0
          for f in $(git ls-files 'catalog/*.json' 'addons/*.json'); do
            python - "$f" <<'PY' || fail=1
          import json, sys
          try:
              json.load(open(sys.argv[1], encoding="utf-8"))
          except Exception as e:
              print(f"::error file={sys.argv[1]}::{e}")
              sys.exit(1)
          PY
          done
          exit $fail
      - name: Check manifest.json is up-to-date
        if: github.event_name == 'pull_request'
        run: python scripts/build_manifest.py --check

  rebuild:
    name: Rebuild manifest.json
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: python scripts/build_manifest.py
      - name: Commit regenerated manifest
        run: |
          if ! git diff --quiet manifest.json 2>/dev/null; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add manifest.json
            git commit -m "chore(ci): rebuild manifest.json"
            git push
          else
            echo "manifest.json already up-to-date"
          fi
